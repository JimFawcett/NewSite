<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <title>Code Workshop</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/Explorer.css" />
  <!-- <link rel="stylesheet" href="css/gridExplorer.css" /> -->
  <script src="js/ContentMenus.js"></script>
  <script src="js/Explorer.js"></script>
  <script src="Tests/BookMarks/js/BookMarks.js" defer></script>
  <style>
    :root {
      --lpanelw: calc(100vw - 15rem);
      --headerht: 2rem;
      --rpanelw: 15rem;
      --dark:#006;
      --light: #cbcdd4;
      --statusred: #FD6A6A;
      --statusgreen: lightgreen;
    }
    body {
      display:flex;
      flex-direction: column;
      position:fixed;
      top:0rem;
      left:0rem;
      height:100dvh;
      width:100dvw;
      margin:0rem;
      padding:0rem;
      font-family: 'Nota Mono', sans-serif;
      font-size:20px;
      background-color: var(--light);
    }
    body, #ifrm, header {
      box-sizing: border-box;
    }
    #github #pgframe {
      width:100%;
      height:calc(100vh - var(--headerht));
      margin:0rem;
      padding: 0rem 0.0rem;
      border:4px solid var(--light);
      border-top:none;
    }
    #github .showloc {
      border:2px solid red;
      padding:0.25rem 0.75rem;
      margin:0.5rem 0rem;
      height: max-content;
    }
    #github header {
      display:flex;
      flex-direction: row;
      align-items: center;
      height:var(--headerht);
      margin:0;
      padding-left:0.5rem;
      font-size:1.0rem;
      vertical-align: middle;
      border:1px solid var(--dark);
    }
    #github #statusLight {
      background-color: #FD6A6A;
      border:2px solid var(--dark);
      border-radius: 10px;
      height:0.5rem;
      width:1.5rem;
      margin-left:4.5rem;
    }
    #github .topButton {
      border:2px solid var(--dark);
      border-radius: 4px;
      width:max-content;
      font-size:0.9rem;
      margin-left:1rem;
      text-decoration: none;
    }
    #github .clickable {
      cursor:pointer;
    }
  </style>
  <script>
    function statusGreen() {
      let status = document.getElementById('statusLight');
      status.style.backgroundColor = 'var(--statusgreen)';
    }
    function statusRed() {
      let status = document.getElementById('statusLight');
      status.style.backgroundColor = 'var(--statusred)';
    }
    window.onmessage = function(e) {
      console.log('PageHost recevied message: ' + e.data);
      switch(e.data.key) {
        case 'loaded':
          statusGreen();
          break;
        case 'loading':
          statusRed();
          console.log('handling loading in PageHost');
          break;
        case 'src':
          console.log('PageHost rcvd msg key: src');
          let frm = document.getElementById('pgframe');
          frm.src = e.data.value;
          // alert(frm.src);
          break;
        case 'url':
          let input = document.getElementById('urlinput');
          if(input) {
            input.value = e.data.value;
          }
          break;
        case 'back':
          history.back();
          break;
        case 'forward':
          history.forward();
          break;
        case 'reload':
          location.reload();
          break;
        case 'setsections':
          break;
        case 'getsections':
          break;
        case 'setpages':
          break;
        case 'getpages':
          break;
        case 'setblogs':
          break;
        case 'getblogs':
          break;
        case 'sethelp':
          break;
        case 'gethelp':
          break;
        case 'setres':
          break;
        case 'getres':
          break;
        default:
          console.log('default in PageHost message loop');
      }
    }
  </script>
  <script>
    function load() {
      processQueryString();
    }
    function startfs() {
      const element = document.documentElement;
      element.requestFullscreen().catch((err) => {
        console.log(`Error attempting to enable full-screen mode: ${err.message}`);
      });      
    }
    function cancelfs() {
      if(document.fullscreenElement) {
        document.exitFullscreen().catch((err) => { console.log('${err.message}')});
      }
    }
    function togglefs() {
      if(document.fullscreenElement) {
        cancelfs();
      } else {
        startfs();
      }
    }
    function togglerf() {}  // recent files

    let bookmarkList = null;
    function ensureBookmarkList() {
      if (bookmarkList || !window.BookmarkList) return bookmarkList;
      bookmarkList = new BookmarkList('#bookmarksList');
      return bookmarkList;
    }
    function togglebm() {
      const panel = document.getElementById('bookmarksPanel');
      if (!panel) return;
      if (panel.classList.contains('hidden')) {
        ensureBookmarkList();
        panel.classList.remove('hidden');
      } else {
        panel.classList.add('hidden');
      }
    }
    function removeAllBookmarks() {
      ensureBookmarkList();
      if (!bookmarkList) return;
      bookmarkList.clear();
    }
    function pageNameFromUrl(urlString) {
      if (!urlString) return '';
      try {
        const u = new URL(urlString, window.location.href);
        let seg = u.pathname.split('/').filter(Boolean).pop() || '';
        if (!seg) return u.hostname || urlString;
        try { seg = decodeURIComponent(seg); } catch {}
        return seg.replace(/\.[a-z0-9]+$/i, '') || u.hostname || urlString;
      } catch {
        return urlString;
      }
    }
    function relPathTo(fromUrl, toUrl) {
      try {
        const fromU = new URL(fromUrl);
        const toU = new URL(toUrl);
        if (fromU.protocol !== toU.protocol || fromU.host !== toU.host) {
          return toU.href;
        }
        const fromSeg = fromU.pathname.split('/');
        const toSeg = toU.pathname.split('/');
        fromSeg.pop(); // drop the explorer filename — we only want its directory
        let i = 0;
        while (i < fromSeg.length && i + 1 < toSeg.length && fromSeg[i] === toSeg[i]) {
          i++;
        }
        const ups = fromSeg.length - i;
        const tail = toSeg.slice(i).join('/');
        return '../'.repeat(ups) + tail + (toU.search || '') + (toU.hash || '');
      } catch {
        return toUrl;
      }
    }
    function getExplorerUrl() {
      const frm = document.getElementById('pgframe');
      if (!frm) return '';
      try {
        const loc = frm.contentWindow && frm.contentWindow.location
          ? frm.contentWindow.location.href
          : '';
        if (loc && loc !== 'about:blank') return loc;
      } catch {}
      return frm.getAttribute('src') || frm.src || '';
    }
    function bookmarkCurrentPage() {
      ensureBookmarkList();
      if (!bookmarkList) return;
      const input = document.getElementById('urlinput');
      const contentUrl = (input && input.value) || '';
      const explorerUrl = getExplorerUrl();
      if (!explorerUrl) return;
      const explorerBase = explorerUrl.split('?')[0].split('#')[0];
      let srcParam = '';
      if (contentUrl) {
        try {
          const contentAbs = new URL(contentUrl, window.location.href).href;
          srcParam = relPathTo(explorerBase, contentAbs);
        } catch {
          srcParam = contentUrl;
        }
      }
      const bookmarkUrl = srcParam ? `${explorerBase}?src=${srcParam}` : explorerBase;
      const displayName =
        pageNameFromUrl(contentUrl) || pageNameFromUrl(explorerBase);
      try { bookmarkList.add(bookmarkUrl, displayName); }
      catch (err) { console.warn('bookmark add failed:', err); }
    }
    document.addEventListener('click', (e) => {
      const a = e.target.closest('#bookmarksList a.bm-link');
      if (!a) return;
      e.preventDefault();
      const href = a.getAttribute('href');
      if (!href) return;
      const frm = document.getElementById('pgframe');
      if (frm) frm.src = href;
      const input = document.getElementById('urlinput');
      if (input) {
        let displayUrl = href;
        try {
          const u = new URL(href, window.location.href);
          const src = u.searchParams.get('src');
          if (src) displayUrl = src;
        } catch {}
        input.value = displayUrl;
      }
      const panel = document.getElementById('bookmarksPanel');
      if (panel) panel.classList.add('hidden');
    });
  </script>
  <style>
    #github .truncate-left{
      width: 22rem;                 /* whatever width you want */
      overflow: hidden;
      text-overflow: ellipsis;      /* enables … */
      direction: rtl;               /* key: show the end first */
      text-align: left;             /* keep text visually left-aligned */
      white-space: nowrap;          /* keep it on one line (mostly for non-inputs) */
    }

    /* When editing, go back to normal LTR so caret/motion feel right */
    #github .truncate-left:focus{
      direction: ltr;
    }

    /* Keep placeholder readable */
    #github .truncate-left::placeholder{
      direction: ltr;
      text-align: left;
    }

    #github #bookmarksPanel {
      position: absolute;
      top: var(--headerht);
      right: 0.5rem;
      width: 30rem;
      max-height: calc(100vh - var(--headerht) - 1rem);
      overflow: auto;
      background: var(--light);
      border: 2px solid var(--dark);
      border-radius: 6px;
      padding: 0.5rem;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #github #bookmarksPanel.hidden { display: none; }
    #github .bm-panel-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--dark);
    }
    #github .bm-panel-header strong {
      margin-right: auto;
      font-size: 1.0rem;
    }
    #github .bm-action-btn {
      border: 2px solid var(--dark);
      border-radius: 4px;
      background: var(--light);
      font-size: 0.85rem;
      padding: 0.1rem 0.5rem;
      cursor: pointer;
    }
    #github #bookmarksPanel .bm-actions { display: none; }
    #github #bookmarksPanel .bm-item {
      padding: 0;
      line-height: 1.1;
    }
    #github #bookmarksPanel .bm-link { color: var(--dark); }
    #github #bookmarksPanel .bm-remove {
      padding: 0 0.35rem;
      font-size: 0.75rem;
      line-height: 1.1;
    }
    #github #bookmarks { color: var(--dark); }
  </style>
</head>
<body id="github" onload="load()">
  <header>
    <strong style="white-space: nowrap; font-size:1.0rem;">Page Host</strong>
    <div id="statusLight"></div>
    <button id="fullscreen" class="clickable topButton" onclick="togglefs()">Full Screen</button>
    <button id="bookmarks" class="clickable topButton statusLight" onclick="togglebm()">bookmarks</button>
    <input type="url" id="urlinput" class="truncate-left" placeholder="url goes here" style="width: 40rem; margin-left:1rem; margin-right:2rem; border-radius: 4px; padding:0.1rem 0.25rem;" />
  </header>
  <iframe id="pgframe" src="Site/Explore.html" name = "pgframe"></iframe>
  <div id="bookmarksPanel" class="hidden">
    <div class="bm-panel-header">
      <strong>Bookmarks</strong>
      <button type="button" class="bm-action-btn" onclick="removeAllBookmarks()">Remove all</button>
      <button type="button" class="bm-action-btn" onclick="bookmarkCurrentPage()">Add current page</button>
      <button type="button" class="bm-action-btn" onclick="togglebm()">close</button>
    </div>
    <div id="bookmarksList"></div>
  </div>
  <script>
    /* this call has to be here, not in onload processing */
    handleIframeTransition();
  </script>
</body>
</html>
